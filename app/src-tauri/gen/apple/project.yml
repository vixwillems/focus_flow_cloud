name: focus-flow
options:
  bundleIdPrefix: com.francescopio.focusflow
  deploymentTarget:
    iOS: 14.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: FocusFlow
      PRODUCT_BUNDLE_IDENTIFIER: com.francescopio.focusflow
      DEVELOPMENT_TEAM: 88QN5KYG2G
  widget:
    base:
      PRODUCT_NAME: FocusFlowWidgets
      PRODUCT_BUNDLE_IDENTIFIER: com.francescopio.focusflow.widget
      DEVELOPMENT_TEAM: 88QN5KYG2G
      SWIFT_VERSION: "5.0"
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      CODE_SIGN_STYLE: Automatic
      SKIP_INSTALL: "YES"
      ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "NO"
      ENABLE_BITCODE: "NO"
      ARCHS: [arm64]
      VALID_ARCHS: arm64
      # The widget's @main entry point and its WidgetKit/ActivityKit/Shared
      # code are all dropped by the release linker's DEAD_CODE_STRIPPING
      # pass because nothing in the linker-visible call graph references
      # them. Without this, the .appex on the device only contains `_main`
      # and no actual widgets — so the widget gallery has nothing to load.
      DEAD_CODE_STRIPPING: "NO"
      STRIP_INSTALLED_PRODUCT: "NO"
      STRIP_STYLE: "non-global"
      DEPLOYMENT_POSTPROCESSING: "NO"
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  focus-flow_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/focus-flow
        includes:
          - "main.mm"
          - "FFLiveActivityBridge.mm"
          - "FFLiveActivityBridge.h"
          - "LiveActivityController.swift"
          - "bindings/**"
      - path: ../../Shared
        type: group
      - path: Assets.xcassets
      - path: focus-flow_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: focus-flow_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: 1.1.0
        CFBundleVersion: "1.1.0"
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
    entitlements:
      path: focus-flow_iOS/focus-flow_iOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.francescopio.focusflow
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
        # Same dead-code-stripping fix as the widget — without this, the
        # release linker drops every `ff_live_activity_*` C symbol and the
        # FFLiveActivity Obj-C class even though `__attribute__((used))` is
        # applied on each C definition. The C attribute on its own is not
        # enough in the app target's link step; the linker still discards
        # the FFLiveActivity class because nothing in the call graph calls
        # it. Belt-and-suspenders: keep both the attribute and the setting.
        DEAD_CODE_STRIPPING: "NO"
        STRIP_INSTALLED_PRODUCT: "NO"
        STRIP_STYLE: "non-global"
        DEPLOYMENT_POSTPROCESSING: "NO"
        # The Live Activity FFI symbols are looked up at runtime via
        # dlsym(RTLD_DEFAULT, ...), which the linker cannot see. The
        # actual mechanism that keeps them in the release binary is
        # `__attribute__((visibility("default"), used))` on each
        # function in FFLiveActivityBridge.mm — see the header for the
        # matching `FF_LIVE_ACTIVITY_EXPORT` macro. (The historical
        # `-Wl,-u,_ff_live_activity_*` form below was the wrong flag for
        # that job: `-u,` forces symbol resolution from static
        # libraries, it does NOT prevent DEAD_CODE_STRIPPING.)
        OTHER_LDFLAGS: $(inherited) -Wl,-u,_ff_live_activity_is_available -Wl,-u,_ff_live_activity_is_enabled -Wl,-u,_ff_live_activity_set_enabled -Wl,-u,_ff_live_activity_start -Wl,-u,_ff_live_activity_update -Wl,-u,_ff_live_activity_end -Wl,-u,_ff_live_activity_end_all -Wl,-u,_ff_live_activity_read_diagnostics -Wl,-u,_ff_write_diagnostics
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
      - sdk: SwiftUI.framework
      - target: FocusFlowWidgetExtension
        embed: true
        codeSign: true
    preBuildScripts:
      - script: export PATH="/Users/vix/.cargo/bin:/Users/vix/.bun/bin:/usr/bin:/bin:/usr/sbin:/sbin:/opt/homebrew/bin" && /Users/vix/.bun/bin/bun tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a

  FocusFlowWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ../../FocusFlowWidgetExtension
        excludes:
          - "Info.plist"
          - "*.entitlements"
      - path: ../../Shared
        type: group
    info:
      path: ../../FocusFlowWidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: FocusFlow
        CFBundleShortVersionString: 1.1.0
        CFBundleVersion: "1.1.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ../../FocusFlowWidgetExtension/FocusFlowWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.francescopio.focusflow
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [widget]
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
